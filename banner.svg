<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes runCat{0%{transform:translateX(-80px)}100%{transform:translateX(760px)}}
@keyframes runDog{0%{transform:translateX(-140px)}100%{transform:translateX(760px)}}
@keyframes runBun{0%{transform:translateX(-200px)}100%{transform:translateX(760px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes tailWag{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes earWig{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
@keyframes legRun{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
.l1{animation:fadeUp .5s .1s ease both}
.l2{animation:fadeUp .5s .35s ease both}
.l3{animation:fadeUp .5s .6s ease both}
.cur{animation:blink 1s .9s step-end infinite}
.cat-run{animation:runCat 4s -1s linear infinite}
.dog-run{animation:runDog 5.5s -2s linear infinite}
.bun-run{animation:runBun 7s -3.5s linear infinite}
.bounce-body{animation:bounce .25s linear infinite}
.bounce-body-slow{animation:bounce .35s linear infinite}
.tail{transform-origin:0px 0px;animation:tailWag .2s linear infinite}
.tail-slow{transform-origin:0px 0px;animation:tailWag .35s linear infinite}
.ear{transform-origin:4px 12px;animation:earWig .4s linear infinite}
.leg-f{transform-origin:4px 0px;animation:legRun .25s linear infinite}
.leg-b{transform-origin:4px 0px;animation:legRun .25s .12s linear infinite}
.leg-fs{transform-origin:4px 0px;animation:legRun .35s linear infinite}
.leg-bs{transform-origin:4px 0px;animation:legRun .35s .17s linear infinite}
</style>
</defs>
